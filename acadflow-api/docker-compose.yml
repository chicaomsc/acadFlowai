services:
  postgres:
    image: postgres:16
    container_name: acadflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: acadflow_db
      POSTGRES_USER: acadflow
      POSTGRES_PASSWORD: acadflow123
    ports:
      - "5434:5432"
    volumes:
      - acadflow_postgres_data:/var/lib/postgresql/data

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: acadflow-gotenberg
    restart: unless-stopped
    ports:
      - "3000:3000"
    command:
      - "gotenberg"
      - "--api-timeout=30s"
      - "--libreoffice-restart-after=10"

volumes:
  acadflow_postgres_data: