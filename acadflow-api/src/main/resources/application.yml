spring:
  application:
    name: acadflow-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/acadflow_db}
    username: ${DB_USERNAME:acadflow}
    password: ${DB_PASSWORD:change-me-in-production}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-NOT-for-production-min32chars!!!}
    expiration: ${JWT_EXPIRATION:86400000}
  export:
    dir: ${EXPORT_DIR:${java.io.tmpdir}/acadflow/exports}
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:10}
    window-ms: ${RATE_LIMIT_WINDOW_MS:60000}
    trust-proxy: ${RATE_LIMIT_TRUST_PROXY:false}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    br.com.dwcore: INFO
